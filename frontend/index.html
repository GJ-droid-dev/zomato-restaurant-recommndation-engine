<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Zomato AI - Restaurant Discovery</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#ffb3b2",
                        "primary-container": "#ff525f",
                        "on-primary": "#680014",
                        "on-primary-container": "#5b0010",
                        "secondary": "#ffb94c",
                        "secondary-container": "#d59001",
                        "background": "#10131b",
                        "on-background": "#e0e2ee",
                        "surface": "#10131b",
                        "on-surface": "#e0e2ee",
                        "surface-variant": "#32353e",
                        "on-surface-variant": "#e6bdbc",
                        "surface-container": "#1c1f28",
                        "surface-container-high": "#272a32",
                        "surface-container-highest": "#32353e"
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans antialiased min-h-screen flex flex-col relative text-on-background bg-background">
    <!-- Background Effects -->
    <div class="glow-orb orb-red"></div>
    <div class="glow-orb orb-gold"></div>
    
    <!-- TopNavBar -->
    <header class="fixed top-0 w-full z-50 bg-surface/40 backdrop-blur-md border-b border-white/10 shadow-[0_0_20px_rgba(242,38,68,0.15)] transition-all duration-300 ease-in-out">
        <div class="flex justify-between items-center px-4 md:px-10 py-4 max-w-7xl mx-auto">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
                <span class="font-bold text-2xl text-primary tracking-tight" style="font-family: 'Outfit', sans-serif;">Zomato AI</span>
            </div>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-sm font-semibold text-primary border-b-2 border-primary pb-1" href="#">Discover</a>
                <a class="text-sm font-semibold text-on-surface-variant hover:text-primary transition-all flex items-center gap-1" href="#">
                    <span class="material-symbols-outlined text-[18px]">auto_awesome</span> AI Concierge
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow pt-32 pb-24 px-4 md:px-10 max-w-7xl mx-auto w-full flex flex-col gap-10 z-10 relative">
        <!-- Hero & Form Section -->
        <section class="flex flex-col items-center text-center gap-4 max-w-3xl mx-auto w-full mb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-on-surface text-balance" style="font-family: 'Outfit', sans-serif;">
                Discover your next <br/>
                <span class="text-gradient-ai">favorite meal</span>
            </h1>
            <p class="text-lg text-on-surface-variant mb-4">
                Let our AI concierge match your cravings with the perfect ambiance.
            </p>
            
            <form class="glass-panel p-6 w-full flex flex-col gap-2 text-left relative overflow-hidden" id="preferences-form">
                <!-- Subtle internal glow for the form -->
                <div class="absolute -top-20 -left-20 w-40 h-40 bg-primary/20 rounded-full blur-[50px] pointer-events-none"></div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 relative z-10">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-medium text-on-surface-variant">Location</label>
                        <select id="location" class="glass-input rounded-lg px-4 py-3 text-sm w-full appearance-none">
                            <option value="">Anywhere in City</option>
                            <!-- Populated by JS -->
                        </select>
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-medium text-on-surface-variant">Cuisine Craving</label>
                        <select id="cuisine" class="glass-input rounded-lg px-4 py-3 text-sm w-full appearance-none">
                            <option value="">Surprise Me</option>
                            <!-- Populated by JS -->
                        </select>
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-medium text-on-surface-variant">Vibe & Budget</label>
                        <select id="budget" class="glass-input rounded-lg px-4 py-3 text-sm w-full appearance-none">
                            <option value="medium">Any Budget</option>
                            <option value="low">Casual (₹)</option>
                            <option value="medium">Standard (₹₹)</option>
                            <option value="high">Premium (₹₹₹)</option>
                        </select>
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-medium text-on-surface-variant flex justify-between">
                            <span>Minimum Rating</span>
                            <span class="text-primary" id="rating-val">4.0+</span>
                        </label>
                        <div class="flex items-center h-full px-2">
                            <input id="rating-slider" class="w-full accent-primary bg-surface-container-high h-2 rounded-full appearance-none" max="5" min="3" step="0.1" type="range" value="4.0"/>
                        </div>
                    </div>
                </div>
                
                <div class="flex flex-col gap-1 mt-2 relative z-10">
                    <label class="text-xs font-medium text-on-surface-variant">Specific Requests (AI Prompt)</label>
                    <textarea id="additional-preferences" class="glass-input rounded-lg px-4 py-3 text-sm w-full resize-none" placeholder="e.g., 'Quiet corner for a date night, must have good cocktails...'" rows="2"></textarea>
                </div>
                
                <button id="submit-btn" class="glow-button text-sm font-semibold py-4 rounded-lg mt-4 flex items-center justify-center gap-2 relative z-10" type="submit">
                    <span class="material-symbols-outlined">auto_awesome</span>
                    Find Restaurants
                </button>
            </form>
        </section>

        <!-- Loading State -->
        <div id="loading-state" class="hidden flex flex-col gap-4 w-full">
            <div class="flex items-center gap-2 text-primary text-sm font-medium justify-center mb-4">
                <span class="material-symbols-outlined animate-spin">sync</span>
                Analyzing venues...
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Skeletons -->
                <div class="glass-panel p-4 h-64 flex flex-col gap-4">
                    <div class="skeleton h-20 w-full rounded-lg"></div>
                    <div class="skeleton h-6 w-3/4"></div>
                    <div class="skeleton h-4 w-1/2"></div>
                    <div class="mt-auto skeleton h-12 w-full"></div>
                </div>
                <div class="glass-panel p-4 h-64 flex flex-col gap-4 hidden md:flex">
                    <div class="skeleton h-20 w-full rounded-lg"></div>
                    <div class="skeleton h-6 w-3/4"></div>
                    <div class="skeleton h-4 w-1/2"></div>
                    <div class="mt-auto skeleton h-12 w-full"></div>
                </div>
                <div class="glass-panel p-4 h-64 flex flex-col gap-4 hidden lg:flex">
                    <div class="skeleton h-20 w-full rounded-lg"></div>
                    <div class="skeleton h-6 w-3/4"></div>
                    <div class="skeleton h-4 w-1/2"></div>
                    <div class="mt-auto skeleton h-12 w-full"></div>
                </div>
            </div>
        </div>

        <!-- Results Container -->
        <div id="results-container" class="hidden flex flex-col gap-4 w-full">
            <h2 class="text-2xl font-semibold text-on-surface flex items-center gap-2" style="font-family: 'Outfit', sans-serif;">
                <span class="material-symbols-outlined text-primary">auto_awesome</span>
                Top Matches for You
            </h2>
            <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Result cards will be injected here via JS -->
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast fixed bottom-8 left-1/2 -translate-x-1/2 z-50 glass-panel px-6 py-3 flex items-center gap-3 bg-surface/90 shadow-[0_10px_40px_rgba(0,0,0,0.5)] border-primary/30">
        <span class="material-symbols-outlined text-primary">info</span>
        <span class="text-sm font-semibold text-on-surface" id="toast-message">Notification</span>
    </div>

    <!-- Template for Result Card -->
    <template id="result-card-template">
        <article class="result-card glass-panel group overflow-hidden flex flex-col h-full relative cursor-pointer pt-12">
            <!-- Rank Badge -->
            <div class="absolute top-4 left-4 z-20 bg-primary-container/90 backdrop-blur-sm text-on-primary-container text-xs font-semibold px-3 py-1 rounded-full shadow-lg border border-primary/20 flex items-center gap-1">
                <span class="material-symbols-outlined text-[16px]">stars</span> <span class="card-rank">#1</span>
            </div>
            <!-- Rating Pill -->
            <div class="absolute top-4 right-4 z-20 bg-surface/80 backdrop-blur-md border border-white/10 text-secondary text-xs font-semibold px-2 py-1 rounded-lg flex items-center gap-1">
                <span class="card-rating">4.4</span> <span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">star</span>
            </div>
            
            <!-- Content -->
            <div class="p-5 flex flex-col flex-grow gap-2 relative z-10">
                <h3 class="text-xl font-bold text-on-surface card-name">Restaurant Name</h3>
                <div class="flex flex-wrap gap-2 mb-2">
                    <span class="px-2 py-1 bg-white/5 border border-white/10 rounded text-on-surface-variant text-xs card-cuisine">Cuisine</span>
                    <span class="px-2 py-1 bg-white/5 border border-white/10 rounded text-on-surface-variant text-xs flex items-center">
                        <span class="material-symbols-outlined text-[14px] mr-1">payments</span> Rs. <span class="card-cost">1000</span> for two
                    </span>
                </div>
                <!-- AI Context Block -->
                <div class="mt-2 bg-primary/10 border border-primary/20 rounded-lg p-3 flex gap-3 items-start">
                    <span class="material-symbols-outlined text-primary mt-0.5">psychology</span>
                    <p class="text-sm text-on-surface-variant leading-relaxed card-explanation">
                        AI Explanation...
                    </p>
                </div>
            </div>
        </article>
    </template>

    <script src="js/app.js"></script>
</body>
</html>
